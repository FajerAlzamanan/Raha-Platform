{% extends "base.html" %}
{% block title %}Reset Password – Raha{% endblock %}

{% block content %}
<!-- Blobs -->
<div class="blob-container">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob" style="width:300px;height:300px;top:50%;left:50%;background:var(--surface);animation-delay:4s"></div>
</div>

<div class="min-h-screen flex items-center justify-center py-12 px-4 relative z-10">
  <div class="w-full max-w-md">
    <div class="card p-8" style="background:var(--bg-card-glass);backdrop-filter:blur(12px);box-shadow:0 20px 60px rgba(0,0,0,.12)">

      <!-- Header -->
      <div class="text-center mb-8">
        <div class="w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4"
             style="background:linear-gradient(135deg,var(--rp),var(--rs));box-shadow:0 8px 20px var(--rp15)">
          <i data-lucide="shield-check" class="w-8 h-8 text-white"></i>
        </div>
        <h1 class="font-heading text-3xl font-bold" style="color:var(--text-primary)">Set New Password</h1>
        <p class="mt-1 text-sm" style="color:var(--text-secondary)">Choose a strong password for your account</p>
      </div>

      <!-- Alerts -->
      <div id="alert-error"   class="alert-error   hidden mb-5"></div>
      <div id="alert-success" class="alert-success hidden mb-5"></div>

      <!-- Form -->
      <form id="reset-form" class="space-y-5">
        <!-- New Password -->
        <div class="space-y-1">
          <label class="text-sm font-medium" style="color:var(--text-primary)">New Password</label>
          <div class="input-icon relative">
            <i data-lucide="lock" class="icon w-4 h-4"></i>
            <input id="f-password" type="password" class="input" style="padding-right:2.5rem" placeholder="••••••••" required/>
            <button type="button" onclick="togglePw('f-password')"
              class="absolute right-3 top-1/2 -translate-y-1/2" style="color:#9ca3af;background:none;border:none;cursor:pointer">
              <i data-lucide="eye" class="w-4 h-4"></i>
            </button>
          </div>
          <p class="text-xs mt-1" style="color:var(--text-secondary)">Min. 8 characters, one uppercase letter, one number</p>
        </div>

        <!-- Confirm Password -->
        <div class="space-y-1">
          <label class="text-sm font-medium" style="color:var(--text-primary)">Confirm Password</label>
          <div class="input-icon relative">
            <i data-lucide="lock" class="icon w-4 h-4"></i>
            <input id="f-confirm" type="password" class="input" style="padding-right:2.5rem" placeholder="••••••••" required/>
            <button type="button" onclick="togglePw('f-confirm')"
              class="absolute right-3 top-1/2 -translate-y-1/2" style="color:#9ca3af;background:none;border:none;cursor:pointer">
              <i data-lucide="eye" class="w-4 h-4"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-primary w-full justify-center py-3 text-base" id="btn-submit">
          Update Password <i data-lucide="arrow-right" class="w-5 h-5"></i>
        </button>
      </form>

      <p class="text-center text-sm mt-6" style="color:var(--text-secondary)">
        Back to
        <a href="/login" class="font-semibold hover:underline" style="color:var(--rp)">Login</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const RESET_TOKEN = {{ token | tojson }};

function togglePw(id) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
  lucide.createIcons();
}

document.getElementById('reset-form').addEventListener('submit', async e => {
  e.preventDefault();
  const password = document.getElementById('f-password').value;
  const confirm  = document.getElementById('f-confirm').value;
  const btn      = document.getElementById('btn-submit');
  const errEl    = document.getElementById('alert-error');
  const okEl     = document.getElementById('alert-success');

  errEl.classList.add('hidden');
  okEl.classList.add('hidden');

  if (password !== confirm) {
    errEl.textContent = 'Passwords do not match.';
    errEl.classList.remove('hidden');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = 'Updating… <i data-lucide="loader-circle" class="w-4 h-4 animate-spin"></i>';
  lucide.createIcons();

  try {
    const data = await api('/api/auth/reset-password', {
      method: 'POST',
      body: JSON.stringify({ token: RESET_TOKEN, password })
    });
    okEl.textContent = data.message + ' Redirecting to login…';
    okEl.classList.remove('hidden');
    document.getElementById('reset-form').classList.add('hidden');
    setTimeout(() => window.location.href = '/login', 2000);
  } catch(err) {
    errEl.textContent = err.message || 'Something went wrong. Please request a new reset link.';
    errEl.classList.remove('hidden');
    btn.disabled = false;
    btn.innerHTML = 'Update Password <i data-lucide="arrow-right" class="w-5 h-5"></i>';
    lucide.createIcons();
  }
});

lucide.createIcons();
</script>
{% endblock %}
