{% extends "base.html" %}
{% block title %}Forgot Password – Raha{% endblock %}

{% block content %}
<!-- Blobs -->
<div class="blob-container">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob" style="width:300px;height:300px;top:50%;left:50%;background:var(--surface);animation-delay:4s"></div>
</div>

<div class="min-h-screen flex items-center justify-center py-12 px-4 relative z-10">
  <div class="w-full max-w-md">
    <div class="card p-8" style="background:var(--bg-card-glass);backdrop-filter:blur(12px);box-shadow:0 20px 60px rgba(0,0,0,.12)">

      <!-- Header -->
      <div class="text-center mb-8">
        <div class="w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4"
             style="background:linear-gradient(135deg,var(--rp),var(--rs));box-shadow:0 8px 20px var(--rp15)">
          <i data-lucide="key-round" class="w-8 h-8 text-white"></i>
        </div>
        <h1 class="font-heading text-3xl font-bold" style="color:var(--text-primary)">Forgot Password?</h1>
        <p class="mt-1 text-sm" style="color:var(--text-secondary)">Enter your email and we'll send you a reset link</p>
      </div>

      <!-- Alerts -->
      <div id="alert-error"   class="alert-error   hidden mb-5"></div>
      <div id="alert-success" class="alert-success hidden mb-5"></div>

      <!-- Form -->
      <form id="forgot-form" class="space-y-5">
        <div class="space-y-1">
          <label class="text-sm font-medium" style="color:var(--text-primary)">Email Address</label>
          <div class="input-icon">
            <i data-lucide="mail" class="icon w-4 h-4"></i>
            <input id="f-email" type="email" class="input" placeholder="researcher@institution.edu" required/>
          </div>
        </div>

        <button type="submit" class="btn-primary w-full justify-center py-3 text-base" id="btn-submit">
          Send Reset Link <i data-lucide="send" class="w-5 h-5"></i>
        </button>
      </form>

      <p class="text-center text-sm mt-6" style="color:var(--text-secondary)">
        Remembered your password?
        <a href="/login" class="font-semibold hover:underline" style="color:var(--rp)">Back to Login</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('forgot-form').addEventListener('submit', async e => {
  e.preventDefault();
  const email = document.getElementById('f-email').value.trim();
  const btn   = document.getElementById('btn-submit');
  const errEl = document.getElementById('alert-error');
  const okEl  = document.getElementById('alert-success');

  errEl.classList.add('hidden');
  okEl.classList.add('hidden');

  btn.disabled = true;
  btn.innerHTML = 'Sending… <i data-lucide="loader-circle" class="w-4 h-4 animate-spin"></i>';
  lucide.createIcons();

  try {
    const data = await api('/api/auth/forgot-password', {
      method: 'POST',
      body: JSON.stringify({ email })
    });
    okEl.textContent = data.message;
    okEl.classList.remove('hidden');
    document.getElementById('forgot-form').classList.add('hidden');
  } catch(err) {
    errEl.textContent = err.message || 'Something went wrong. Please try again.';
    errEl.classList.remove('hidden');
    btn.disabled = false;
    btn.innerHTML = 'Send Reset Link <i data-lucide="send" class="w-5 h-5"></i>';
    lucide.createIcons();
  }
});

lucide.createIcons();
</script>
{% endblock %}
