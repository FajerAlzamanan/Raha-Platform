{% extends "base.html" %}
{% block title %}Login – Raha{% endblock %}

{% block content %}
<!-- Blobs -->
<div class="blob-container">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob" style="width:300px;height:300px;top:50%;left:50%;background:var(--surface);animation-delay:4s"></div>
</div>

<div class="min-h-screen flex items-center justify-center py-12 px-4 relative z-10">
  <div class="w-full max-w-md">
    <div class="card p-8" style="background:var(--bg-card-glass);backdrop-filter:blur(12px);box-shadow:0 20px 60px rgba(0,0,0,.12)">

      <!-- Header -->
      <div class="text-center mb-8">
        <div class="w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4"
             style="background:linear-gradient(135deg,var(--rp),var(--rs));box-shadow:0 8px 20px var(--rp15)">
          <i data-lucide="lock" class="w-8 h-8 text-white"></i>
        </div>
        <h1 class="font-heading text-3xl font-bold" style="color:var(--text-primary)">Welcome Back</h1>
        <p class="mt-1 text-sm" style="color:var(--text-secondary)">Log in to access your Raha workspace</p>
      </div>

      <!-- Alerts -->
      <div id="alert-error"   class="alert-error   hidden mb-5"></div>
      <div id="alert-success" class="alert-success hidden mb-5"></div>

      <!-- Form -->
      <form id="login-form" class="space-y-5">
        <!-- Email -->
        <div class="space-y-1">
          <label class="text-sm font-medium" style="color:var(--text-primary)">Email Address</label>
          <div class="input-icon">
            <i data-lucide="mail" class="icon w-4 h-4"></i>
            <input id="f-email" type="email" class="input" placeholder="researcher@institution.edu" required/>
          </div>
        </div>

        <!-- Password -->
        <div class="space-y-1">
          <div class="flex justify-between items-center">
            <label class="text-sm font-medium" style="color:var(--text-primary)">Password</label>
            <a href="/forgot-password" class="text-sm font-medium hover:underline" style="color:var(--rp)">Forgot password?</a>
          </div>
          <div class="input-icon relative">
            <i data-lucide="lock" class="icon w-4 h-4"></i>
            <input id="f-password" type="password" class="input" style="padding-right:2.5rem" placeholder="••••••••" required/>
            <button type="button" onclick="togglePw('f-password')"
              class="absolute right-3 top-1/2 -translate-y-1/2" style="color:#9ca3af;background:none;border:none;cursor:pointer">
              <i data-lucide="eye" class="w-4 h-4"></i>
            </button>
          </div>
        </div>

        <!-- Remember me -->
        <label class="flex items-center gap-2 cursor-pointer text-sm" style="color:var(--text-secondary)">
          <input type="checkbox" id="f-remember" class="rounded"/>
          Remember me
        </label>

        <!-- Submit -->
        <button type="submit" class="btn-primary w-full justify-center py-3 text-base" id="btn-submit">
          Log In <i data-lucide="arrow-right" class="w-5 h-5"></i>
        </button>
      </form>

      <p class="text-center text-sm mt-6" style="color:var(--text-secondary)">
        Don't have an account?
        <a href="/signup" class="font-semibold hover:underline" style="color:var(--rp)">Create one now</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function togglePw(id) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
  lucide.createIcons();
}

document.getElementById('login-form').addEventListener('submit', async e => {
  e.preventDefault();
  const email    = document.getElementById('f-email').value.trim();
  const password = document.getElementById('f-password').value;
  const remember = document.getElementById('f-remember').checked;
  const btn      = document.getElementById('btn-submit');

  // Email validation
  const [local, domain] = email.split('@');
  if (!domain) return showErr('Invalid email format');
  const common = ['gmail.com','hotmail.com','yahoo.com','outlook.com','icloud.com','live.com'];
  const ok = common.includes(domain.toLowerCase())
    || domain.endsWith('.edu.sa') || domain.endsWith('.gov.sa')
    || domain.endsWith('.edu')    || domain.endsWith('.org')
    || email === 'admin@raha.com';
  if (!ok) return showErr('Invalid email format, invalid domain name or institution name');

  btn.innerHTML = 'Logging in… <i data-lucide="loader-circle" class="w-4 h-4 animate-spin"></i>';
  lucide.createIcons();

  try {
    const data = await api('/api/auth/login', {
      method: 'POST', body: JSON.stringify({ email, password })
    });
    Auth.save(data.token, { email, role: data.role, full_name: data.full_name }, remember);
    document.getElementById('alert-success').textContent = 'Login successful! Redirecting…';
    document.getElementById('alert-success').classList.remove('hidden');
    setTimeout(() => window.location.href = '/', 1200);
  } catch(err) {
    showErr('Invalid email or password. Please try again.');
    btn.innerHTML = 'Log In <i data-lucide="arrow-right" class="w-5 h-5"></i>';
    lucide.createIcons();
  }
});

function showErr(msg) {
  const el = document.getElementById('alert-error');
  el.textContent = msg; el.classList.remove('hidden');
}

lucide.createIcons();
</script>
{% endblock %}
